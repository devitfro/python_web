<!DOCTYPE html>
<html>
<head>
    <title>{{ event.name }}</title>
</head>
<body>
<h2>{{ event.name }}</h2>
<p>Дата: {{ event.date }}</p>

<h3>Участники:</h3>
<ul>
    {% for p in event.participants.all %}
        <li>{{ p.email }}</li>
    {% empty %}
        <li>Нет участников</li>
    {% endfor %}
</ul>

<a href="{% url 'create_event' %}">← Создать новое мероприятие</a>
</body>
</html>
