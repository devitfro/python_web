{% extends 'news/base.html' %}
{% block title %}{{ news.title }}{% endblock %}

{% block content %}
<h2>{{ news.title }}</h2>
{% load static %}
<img src="{% static news.image %}" style="max-width:100%;" alt="Новость">
<p>{{ news.text }}</p>
<a href="{% url 'category' news.category %}">← Вернуться к категории</a>
{% endblock %}
