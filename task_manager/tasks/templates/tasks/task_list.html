<h1>Список задач</h1>

<a href="/tasks/add/">Добавить</a>

<ul>
  {% for task in tasks %}
    <li>
      <b>{{ task.title }}</b><br>
      {{ task.description }}<br>
      {{ task.start_date }} - {{ task.end_date }}<br>

      <a href="/tasks/delete/{{ task.id }}/">Удалить</a>
    </li>
  {% endfor %}
</ul>
